<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 75%;
        }

        .user {
            background: #DCF8C6;
            align-self: flex-end;
        }

        .bot {
            background: #eee;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header"> Communication Chatbot</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value;

        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        const response = await fetch("http://127.0.0.1:8000/chat?msg=" + encodeURIComponent(message), {
            method: "POST"
        });

        const data = await response.json();
        addMessage(data.response, "bot");
    }

    function addMessage(text, sender) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");

        msgDiv.classList.add("message", sender);
        msgDiv.innerText = text;

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
